services:

  axum_api:
    image: ghcr.io/${GH_REPO_OWNER}/${IMAGE_NAME}:latest
    container_name: axum_api
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:4000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      PORT: ${PORT:-4000}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      RUST_LOG: ${RUST_LOG:-axum_api=info}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - axum_net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  redis:
    image: redis:7.4-alpine
    container_name: axum_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --save 60 1
      --loglevel warning
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - axum_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: axum_cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CF_TUNNEL_TOKEN}
    depends_on:
      axum_api:
        condition: service_healthy
    networks:
      - axum_net

volumes:
  redis_data:
    driver: local

networks:
  axum_net:
    driver: bridge