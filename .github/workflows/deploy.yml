deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          # 🟢 [จุดที่ต้องเพิ่ม] ส่งตัวแปรเข้าไปใน SSH Session
          envs: GH_REPO_OWNER,IMAGE_NAME
        env:
          GH_REPO_OWNER: ${{ github.repository_owner }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}

        script: |
          # 1. ไปที่โฟลเดอร์โปรเจกต์
          cd /home/dserver/share_folder/application/axum_api

          # 2. เขียนไฟล์ .env (เพิ่ม GH_REPO_OWNER และ IMAGE_NAME ลงไปด้วย)
          cat > .env << ENVEOF
          GH_REPO_OWNER=$GH_REPO_OWNER
          IMAGE_NAME=$IMAGE_NAME
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
          REDIS_URL=redis://:${{ secrets.REDIS_PASSWORD }}@redis:6379
          CF_TUNNEL_TOKEN=${{ secrets.CF_TUNNEL_TOKEN }}
          PORT=4000
          RUST_LOG=axum_api=info
          ENVEOF

          # 3. ล็อกอินและรัน Docker
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

          docker compose pull
          docker compose up -d --remove-orphans

          # 4. ล้าง Image เก่า
          docker image prune -f
