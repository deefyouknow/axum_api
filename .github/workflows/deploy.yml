name: Deploy Axum API

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: axum_api

jobs:
  # --- JOB 1: ตรวจสอบโค้ด ---
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-

      - name: Check compile
        run: cargo check --release

      - name: Clippy lint
        run: cargo clippy --release -- -D warnings

      - name: Run tests
        run: cargo test --release

  # --- JOB 2: สร้างและ Push Docker Image ---
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # --- JOB 3: Deploy ไปยัง Server (ส่วนที่มีการแก้ไข) ---
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          # ส่งตัวแปรเพื่อให้คำสั่ง docker compose pull ทำงานได้
          envs: GH_REPO_OWNER,IMAGE_NAME
        env:
          GH_REPO_OWNER: ${{ github.repository_owner }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
        with:
          script: |
            cd /home/dserver/share_folder/application/axum_api

            # สร้างไฟล์ .env จากค่าใน GitHub Secrets
            cat > .env << ENVEOF
            GH_REPO_OWNER=$GH_REPO_OWNER
            IMAGE_NAME=$IMAGE_NAME
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
            REDIS_URL=redis://:${{ secrets.REDIS_PASSWORD }}@redis:6379
            CF_TUNNEL_TOKEN=${{ secrets.CF_TUNNEL_TOKEN }}
            PORT=4000
            RUST_LOG=axum_api=info
            ENVEOF

            # Login และสั่ง Deploy
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
